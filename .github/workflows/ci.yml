name: ci

on:
  push:
    branches: [chiyuan]
  pull_request:
    branches: [chiyuan]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install srl with dev tooling (jupytext)
        run: uv pip install --system -e ".[dev]"

      - name: Tutorial notebooks are in sync with their .py sources
        run: python tutorials/build_notebooks.py --check
